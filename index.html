<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>web @Book549 - ปิดปรับปรุงชั่วคราว</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 30px 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 28px;
      color: #2c3e50;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .link-box {
      padding: 15px;
      background-color: #eef6ff;
      border-left: 5px solid #3498db;
      border-radius: 8px;
      margin-bottom: 25px;
    }

    a.button {
      display: inline-block;
      background-color: #3498db;
      color: #fff;
      padding: 10px 20px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #217dbb;
    }

    .footer {
      font-size: 14px;
      color: #777;
      margin-top: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1> web @Book549</h1>
    <p><strong>เว็บไซต์กำลังปิดปรับปรุงชั่วคราว</strong></p>
    <p style="color: #555;">ขออภัยในความไม่สะดวก ขณะนี้เว็บไซต์กำลัง<strong>ปิดปรับปรุงชั่วคราว</strong></p>
    <p class="footer"> ขอบคุณที่แวะมาเยี่ยมชม</p>
  </div>
</body>
</html>
