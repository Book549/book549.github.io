<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Hybrid Marker WebAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>


  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }

    #status {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      padding: 10px 14px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      text-align: center;
    }
    #status.error { background: rgba(180, 0, 0, 0.85); }

    #indicator-panel {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
    }
    .indicator-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }
    .indicator-row .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888; /* checking / not yet known */
      flex-shrink: 0;
    }
    .indicator-row.ok .dot { background: #2ecc40; }
    .indicator-row.error .dot { background: #ff4136; }
  </style>
</head>
<body>

  <div id="status">Loading model…</div>
  <div id="indicator-panel">
    <div class="indicator-row" id="ind-model"><span class="dot"></span><span class="label">Model: checking…</span></div>
    <div class="indicator-row" id="ind-texture"><span class="dot"></span><span class="label">Texture: checking…</span></div>
    <div class="indicator-row" id="ind-pattern"><span class="dot"></span><span class="label">Pattern: checking…</span></div>
    <div class="indicator-row" id="ind-detection"><span class="dot"></span><span class="label">Detection: searching…</span></div>
  </div>

  <a-scene vr-mode-ui="enabled: false" xr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets id="ar-assets" timeout="20000"></a-assets>

    <a-marker id="ar-marker" type="pattern" url="">
      <!-- 3D model entity gets its attributes injected once we know the model name -->
      <a-entity
        id="ar-model"
        position="0 0 0"
        scale="1 1 1"
        rotation="0 0 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function () {
      "use strict";

      // ------------------------------------------------------------------
      // Config: where assets live on this server.
      //
      //   models/    .obj + .mtl only.
      //   textures/  texture images (.jpg/.png) referenced BY the .mtl
      //   patterns/  .patt files AR.js uses for optical tracking
      //   markers/   printable marker .png files — NOT loaded here, this
      //              page never fetches from markers/; it's only what a
      //              human prints and points the camera at.
      //
      // NOTE on textures/: this page does not fetch texture files
      // directly — the .mtl's `map_Kd` line resolves them. Because
      // models/ and textures/ are now sibling folders, every .mtl must
      // reference its texture with a path that climbs out of models/,
      // e.g.:
      //     map_Kd ../textures/earth.jpg
      // A browser resolves that relative to the .mtl's own URL
      // (models/earth.mtl), so "models/../textures/earth.jpg" normalizes
      // to "textures/earth.jpg" automatically — no extra JS required.
      // ------------------------------------------------------------------
      const MODELS_DIR = "models/";
      const TEXTURES_DIR = "textures/";     // see note above — informational only
      const PATTERNS_DIR = "patterns/";     // where the matching .patt lives
      const MAX_NAME_LEN = 64;

      const statusEl = document.getElementById("status");

      function setStatus(msg, isError) {
        statusEl.textContent = msg;
        statusEl.classList.toggle("error", !!isError);
      }

      // Drives one row of the bottom-left indicator panel.
      // rowId: "ind-model" | "ind-texture" | "ind-pattern" | "ind-detection"
      // state: "checking" | "ok" | "error"
      function setIndicator(rowId, msg, state) {
        const row = document.getElementById(rowId);
        if (!row) return;
        row.querySelector(".label").textContent = msg;
        row.classList.remove("ok", "error");
        if (state === "ok" || state === "error") {
          row.classList.add(state);
        }
      }

      // Generic reachability probe used by the model/texture/pattern checks.
      function checkReachable(url) {
        return fetch(url, { method: "GET", cache: "no-store" })
          .then((res) => ({ ok: res.ok, status: res.status }))
          .catch(() => ({ ok: false, status: null }));
      }

      // ------------------------------------------------------------------
      // Security: sanitize the "model" query param before it ever touches
      // the DOM or is used to build a resource path.
      //
      // Rules:
      //   - Only [a-zA-Z0-9_-] survive
      //   - No '/', '\', '..', or any path-control characters
      //   - Bounded length
      //   - Empty / invalid input -> reject, do NOT fall back to a guess
      // ------------------------------------------------------------------
      function sanitizeModelName(raw) {
        if (typeof raw !== "string") return null;

        // Reject outright if any traversal / separator sequence is present
        if (raw.includes("..") || raw.includes("/") || raw.includes("\\")) {
          return null;
        }

        // Strip to a strictly safe character set
        const cleaned = raw.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "");

        if (!cleaned) return null;
        if (cleaned.length > MAX_NAME_LEN) return null;

        // Must match the same conservative pattern used server-side
        if (!/^[a-z0-9_-]+$/.test(cleaned)) return null;

        return cleaned;
      }

      // ------------------------------------------------------------------
      // Read & validate the "model" URL parameter
      // ------------------------------------------------------------------
      const params = new URLSearchParams(window.location.search);
      const rawModel = params.get("model");
      const modelName = sanitizeModelName(rawModel);

      if (!modelName) {
        setStatus("Invalid or missing model name in URL (?model=...)", true);
        // Do not touch the scene further — nothing safe to load.
        return;
      }

      // ------------------------------------------------------------------
      // Build safe, fixed-shape resource paths. Because modelName is
      // restricted to [a-z0-9_-], path traversal / injection is not
      // possible here even though we're doing plain string concatenation.
      //
      // Texture files in textures/ are intentionally not referenced here:
      // they're pulled in indirectly when the .mtl loads (see the
      // TEXTURES_DIR note above).
      // ------------------------------------------------------------------
      const objUrl = `${MODELS_DIR}${modelName}.obj`;
      const mtlUrl = `${MODELS_DIR}${modelName}.mtl`;
      const pattUrl = `${PATTERNS_DIR}${modelName}.patt`;

      setStatus(`Loading model: ${modelName}`);

      // ------------------------------------------------------------------
      // Inject <a-asset-item> tags via the DOM API (not innerHTML), so
      // there is no string-based HTML injection surface at all.
      // ------------------------------------------------------------------
      const assetsEl = document.getElementById("ar-assets");

      const objAsset = document.createElement("a-asset-item");
      objAsset.setAttribute("id", "model-obj");
      objAsset.setAttribute("src", objUrl);
      assetsEl.appendChild(objAsset);

      const mtlAsset = document.createElement("a-asset-item");
      mtlAsset.setAttribute("id", "model-mtl");
      mtlAsset.setAttribute("src", mtlUrl);
      assetsEl.appendChild(mtlAsset);

      // Point the marker at the matching, mathematically-generated .patt
      const markerEl = document.getElementById("ar-marker");
      markerEl.setAttribute("url", pattUrl);

      // Independently verify the .patt file is actually reachable. AR.js
      // fails silently if this 404s (no markerFound event ever fires, with
      // no on-screen error), so this check exists purely to surface that
      // failure mode via the bottom-left indicator.
      checkReachable(pattUrl).then(({ ok, status }) => {
        if (ok) {
          setIndicator("ind-pattern", "Pattern: OK", "ok");
        } else {
          setIndicator("ind-pattern", `Pattern: ${status ?? "fetch failed"}`, "error");
        }
      });

      // Same idea for the .obj — confirms it's reachable independently of
      // whatever three.js's OBJLoader ends up reporting.
      checkReachable(objUrl).then(({ ok, status }) => {
        if (ok) {
          setIndicator("ind-model", "Model: OK", "ok");
        } else {
          setIndicator("ind-model", `Model: ${status ?? "fetch failed"}`, "error");
        }
      });

      // Texture check: nothing in this page fetches textures directly (the
      // .mtl's map_Kd line does, indirectly, inside three.js's MTLLoader).
      // So to surface a broken/missing texture, fetch the .mtl as text,
      // pull out the map_Kd path, resolve it the same way a browser would
      // relative to the .mtl's own URL, then probe that resolved URL.
      checkReachable(mtlUrl).then(({ ok: mtlOk, status: mtlStatus }) => {
        if (!mtlOk) {
          setIndicator("ind-texture", `Texture: .mtl ${mtlStatus ?? "fetch failed"}`, "error");
          return;
        }
        fetch(mtlUrl, { cache: "no-store" })
          .then((res) => res.text())
          .then((mtlText) => {
            const match = mtlText.match(/^\s*map_Kd\s+(.+?)\s*$/mi);
            if (!match) {
              setIndicator("ind-texture", "Texture: no map_Kd in .mtl", "error");
              return;
            }
            const texPath = match[1];
            const mtlAbsUrl = new URL(mtlUrl, window.location.href);
            const texAbsUrl = new URL(texPath, mtlAbsUrl);
            checkReachable(texAbsUrl.href).then(({ ok, status }) => {
              if (ok) {
                setIndicator("ind-texture", "Texture: OK", "ok");
              } else {
                setIndicator("ind-texture", `Texture: ${status ?? "fetch failed"}`, "error");
              }
            });
          })
          .catch(() => {
            setIndicator("ind-texture", "Texture: .mtl parse failed", "error");
          });
      });

      // Attach the obj-model component once assets are ready
      const modelEl = document.getElementById("ar-model");

      function attachModel() {
        modelEl.setAttribute("obj-model", "obj: #model-obj; mtl: #model-mtl");
      }

      // If the .mtl fails to load (model has no material file), fall back
      // to loading the .obj alone rather than breaking the scene.
      let mtlFailed = false;
      mtlAsset.addEventListener("error", () => {
        mtlFailed = true;
      });

      assetsEl.addEventListener("loaded", () => {
        if (mtlFailed) {
          modelEl.setAttribute("obj-model", "obj: #model-obj");
        } else {
          attachModel();
        }
        setStatus(`Model "${modelName}" ready — point camera at the marker.`);
        // Authoritative confirmation the .obj actually parsed, overriding
        // the earlier reachability-only check.
        setIndicator("ind-model", "Model: OK", "ok");
      });

      modelEl.addEventListener("model-error", () => {
        setStatus(`Failed to load model: ${modelName}`, true);
        setIndicator("ind-model", "Model: load failed", "error");
      });

      markerEl.addEventListener("markerFound", () => {
        setStatus(`Tracking marker for "${modelName}"`);
        setIndicator("ind-detection", "Detection: tracking", "ok");
      });
      markerEl.addEventListener("markerLost", () => {
        setStatus(`Point camera at the "${modelName}" marker`);
        setIndicator("ind-detection", "Detection: searching…", "checking");
      });
    })();
  </script>
</body>
</html>
